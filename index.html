<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GoldenSpin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            background: linear-gradient(145deg, #1a1a3e, #0d0d2b);
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            box-shadow: 0 0 40px rgba(128, 0, 255, 0.3);
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 16px;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .balance {
            font-size: 18px;
            font-weight: bold;
            color: #f5b042;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            padding: 14px 0;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tab {
            cursor: pointer;
            font-size: 16px;
            padding: 8px 24px;
            border-radius: 20px;
            transition: all 0.3s;
            color: #aaa;
        }
        .tab.active {
            background: rgba(245, 176, 66, 0.2);
            color: #f5b042;
            font-weight: bold;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .ticket-wheel {
            perspective: 800px;
            margin: 20px 0;
        }
        .ticket {
            width: 160px;
            height: 220px;
            background: linear-gradient(135deg, #2b2b5c, #1e1e4a);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: #f5b042;
            box-shadow: 0 0 30px rgba(255,215,0,0.4);
            transition: transform 1.2s cubic-bezier(0.25, 0.1, 0.15, 1);
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        .ticket.spinning {
            animation: spin 1.2s ease-in-out;
        }
        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(1800deg); }
        }
        .spin-btn {
            background: #f5b042;
            border: none;
            color: #0a0a1a;
            font-weight: bold;
            font-size: 18px;
            padding: 14px 40px;
            border-radius: 30px;
            margin: 25px 0;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(245,176,66,0.5);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .spin-btn:active { transform: scale(0.96); }
        .spin-btn:disabled { opacity: 0.5; pointer-events: none; }
        .win-display {
            font-size: 24px;
            margin-top: 10px;
            height: 36px;
            color: #f5b042;
        }
        .promo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }
        .promo-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            width: 100%;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        .promo-btn {
            background: #00c6ac;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .message {
            color: #aaa;
            min-height: 24px;
            margin: 10px 0;
        }
        .hidden { display: none; }
        .history {
            width: 100%;
            margin-top: 20px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <span class="balance"><i class="fas fa-coins"></i> <span id="balanceVal">100</span> ₴</span>
        <span style="opacity:0.7;">GoldenSpin</span>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="game"><i class="fas fa-ticket-alt"></i> Гра</div>
        <div class="tab" data-tab="promo"><i class="fas fa-gift"></i> Промокод</div>
    </div>
    <div class="content">
        <!-- Ігровий екран -->
        <div id="game-screen" class="game-area">
            <div class="ticket-wheel">
                <div class="ticket" id="ticketEl"><i class="fas fa-star"></i></div>
            </div>
            <div class="win-display" id="winDisplay"></div>
            <button class="spin-btn" id="spinBtn"><i class="fas fa-sync-alt"></i> Крутити за 10 ₴</button>
            <div class="message" id="gameMsg"></div>
            <div class="history" id="historyContainer"></div>
        </div>
        <!-- Промокод -->
        <div id="promo-screen" class="promo-section hidden">
            <input type="text" class="promo-input" placeholder="Введіть промокод" id="promoInput">
            <button class="promo-btn" id="promoBtn"><i class="fas fa-check"></i> Активувати</button>
            <div class="message" id="promoMsg"></div>
        </div>
    </div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const balanceEl = document.getElementById('balanceVal');
    const ticketEl = document.getElementById('ticketEl');
    const winDisplay = document.getElementById('winDisplay');
    const spinBtn = document.getElementById('spinBtn');
    const gameMsg = document.getElementById('gameMsg');
    const historyContainer = document.getElementById('historyContainer');
    const promoInput = document.getElementById('promoInput');
    const promoBtn = document.getElementById('promoBtn');
    const promoMsg = document.getElementById('promoMsg');

    let currentBalance = 100;
    let isSpinning = false;
    const spinHistory = [];

    // Використовуємо initData для авторизації
    const initData = tg.initData || tg.initDataUnsafe?.query_id ? tg.initData : '';

    // API-заголовки
    function getHeaders() {
        return { 'X-Telegram-Init-Data': initData };
    }

    // Оновлення балансу
    async function fetchBalance() {
        const res = await fetch('/api/balance', { headers: getHeaders() });
        if (res.ok) {
            const data = await res.json();
            currentBalance = data.balance;
            balanceEl.textContent = currentBalance.toFixed(2);
        }
    }

    // Крутка
    async function doSpin() {
        if (isSpinning || currentBalance < 10) {
            gameMsg.textContent = 'Недостатньо коштів';
            return;
        }
        isSpinning = true;
        spinBtn.disabled = true;
        winDisplay.textContent = '';
        ticketEl.classList.add('spinning');

        try {
            const res = await fetch('/api/spin', { headers: getHeaders() });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Помилка');

            // Чекаємо завершення анімації
            setTimeout(() => {
                ticketEl.classList.remove('spinning');
                winDisplay.textContent = `Виграш: ${data.win_amount} ₴`;
                currentBalance = data.new_balance;
                balanceEl.textContent = currentBalance.toFixed(2);
                addHistory(data.win_amount);
                isSpinning = false;
                spinBtn.disabled = false;
            }, 1300);
        } catch (err) {
            ticketEl.classList.remove('spinning');
            gameMsg.textContent = err.message;
            isSpinning = false;
            spinBtn.disabled = false;
        }
    }

    function addHistory(win) {
        spinHistory.unshift(win);
        if (spinHistory.length > 5) spinHistory.pop();
        renderHistory();
    }

    function renderHistory() {
        historyContainer.innerHTML = spinHistory.map(w => `<div class="history-item"><span><i class="fas fa-star"></i> ${w} ₴</span></div>`).join('');
    }

    // Промокод
    async function redeemCode() {
        const code = promoInput.value.trim();
        if (!code) { promoMsg.textContent = 'Введіть код'; return; }
        promoBtn.disabled = true;
        try {
            const res = await fetch('/api/redeem', {
                method: 'POST',
                headers: { ...getHeaders(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail);
            promoMsg.textContent = data.message || 'Промокод активовано!';
            currentBalance = data.new_balance;
            balanceEl.textContent = currentBalance.toFixed(2);
        } catch (err) {
            promoMsg.textContent = err.message;
        } finally {
            promoBtn.disabled = false;
        }
    }

    // Перемикання вкладок
    const tabs = document.querySelectorAll('.tab');
    const screens = {
        game: document.getElementById('game-screen'),
        promo: document.getElementById('promo-screen')
    };
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            for (let key in screens) {
                screens[key].classList.add('hidden');
            }
            screens[tabName].classList.remove('hidden');
        });
    });

    spinBtn.addEventListener('click', doSpin);
    promoBtn.addEventListener('click', redeemCode);

    // Початкове завантаження
    fetchBalance();
</script>
</body>
</html>
